<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>国际会议追踪</title>
<style>
  :root {
    --bg: #f8f8f6;
    --card-bg: #ffffff;
    --text: #1a1a18;
    --muted: #6b6b66;
    --border: rgba(0,0,0,0.1);
    --border-hover: rgba(0,0,0,0.2);
    --info-bg: #e6f1fb;
    --info-text: #0c447c;
    --urgent-bg: #fcebeb;
    --urgent-text: #a32d2d;
    --soon-bg: #faeeda;
    --soon-text: #854f0b;
    --ok-bg: #eaf3de;
    --ok-text: #3b6d11;
    --passed-bg: #f1efe8;
    --passed-text: #5f5e5a;
    --radius: 12px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1c1a;
      --card-bg: #252523;
      --text: #e8e6df;
      --muted: #9b9990;
      --border: rgba(255,255,255,0.1);
      --border-hover: rgba(255,255,255,0.2);
      --info-bg: #042c53;
      --info-text: #85b7eb;
      --urgent-bg: #501313;
      --urgent-text: #f09595;
      --soon-bg: #412402;
      --soon-text: #fac775;
      --ok-bg: #173404;
      --ok-text: #c0dd97;
      --passed-bg: #2c2c2a;
      --passed-text: #888780;
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 2rem 1.5rem;
  }
  .container { max-width: 1100px; margin: 0 auto; }

  header { margin-bottom: 2rem; }
  header h1 { font-size: 1.6rem; font-weight: 600; margin-bottom: 0.3rem; }
  header p { font-size: 0.85rem; color: var(--muted); }
  .updated { font-size: 0.78rem; color: var(--muted); margin-top: 0.25rem; }

  .controls {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
    align-items: center;
    margin-bottom: 1.5rem;
  }
  .filter-btn {
    font-size: 0.8rem;
    padding: 5px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
  }
  .filter-btn:hover { border-color: var(--border-hover); color: var(--text); }
  .filter-btn.active {
    background: var(--info-bg);
    color: var(--info-text);
    border-color: transparent;
  }
  .sort-wrap { margin-left: auto; }
  .sort-wrap select {
    font-size: 0.8rem;
    padding: 5px 10px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--card-bg);
    color: var(--muted);
    cursor: pointer;
  }
  .search-wrap input {
    font-size: 0.8rem;
    padding: 5px 12px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--card-bg);
    color: var(--text);
    width: 180px;
    outline: none;
    transition: border-color 0.15s;
  }
  .search-wrap input:focus { border-color: var(--border-hover); }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 12px;
  }
  .card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1rem 1.25rem;
    transition: border-color 0.15s, transform 0.1s;
    border-left: 3px solid transparent;
    cursor: default;
  }
  .card:hover { border-color: var(--border-hover); transform: translateY(-1px); }
  .card.urgent  { border-left-color: #e24b4a; }
  .card.soon    { border-left-color: #ef9f27; }
  .card.ok      { border-left-color: #1d9e75; }
  .card.passed  { border-left-color: #b4b2a9; opacity: 0.6; }

  .card-head { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; margin-bottom: 6px; }
  .conf-abbr { font-size: 1rem; font-weight: 600; }
  .conf-abbr a { color: var(--info-text); text-decoration: none; }
  .conf-abbr a:hover { text-decoration: underline; }

  .badge {
    font-size: 0.7rem;
    font-weight: 600;
    padding: 3px 10px;
    border-radius: 20px;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .badge.urgent  { background: var(--urgent-bg);  color: var(--urgent-text);  }
  .badge.soon    { background: var(--soon-bg);    color: var(--soon-text);    }
  .badge.ok      { background: var(--ok-bg);      color: var(--ok-text);      }
  .badge.passed  { background: var(--passed-bg);  color: var(--passed-text);  }

  .conf-full { font-size: 0.78rem; color: var(--muted); margin-bottom: 10px; line-height: 1.45; }
  .area-tag {
    display: inline-block;
    font-size: 0.7rem;
    padding: 2px 8px;
    border-radius: 4px;
    background: var(--info-bg);
    color: var(--info-text);
    margin-bottom: 10px;
  }

  .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .info-label { font-size: 0.7rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 2px; }
  .info-value { font-size: 0.82rem; color: var(--text); }
  .info-value.highlight { font-weight: 600; }

  .empty { text-align: center; padding: 4rem; color: var(--muted); font-size: 0.9rem; }
  .loading { text-align: center; padding: 4rem; color: var(--muted); }

  .error-box {
    background: var(--urgent-bg);
    color: var(--urgent-text);
    border-radius: var(--radius);
    padding: 1rem;
    margin-bottom: 1.5rem;
    font-size: 0.85rem;
  }

  footer { margin-top: 3rem; text-align: center; font-size: 0.75rem; color: var(--muted); }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>IEEE 国際会議開催情報の追跡</h1>
    <p>会議名をクリックすると公式サイトへ移動 · 締切状況は色で表示</p>
    <div class="updated" id="updated-time"></div>
  </header>

  <div class="controls">
    <button class="filter-btn active" data-filter="all">全て</button>
    <button class="filter-btn" data-filter="urgent">締切間近（30日以内）</button>
    <button class="filter-btn" data-filter="soon">要注意（90日以内）</button>
    <button class="filter-btn" data-filter="ok">余裕あり</button>
    <button class="filter-btn" data-filter="passed">締切済み</button>
    <div class="search-wrap">
      <input type="text" id="search" placeholder="会議名で検索…" oninput="render()">
    </div>
    <div class="sort-wrap">
      <select id="sort" onchange="render()">
        <option value="deadline">投稿締切順</option>
        <option value="conf">会議開催日順</option>
        <option value="name">名称順</option>
      </select>
    </div>
  </div>

  <div id="error-area"></div>
  <div class="grid" id="grid">
    <div class="loading">読み込み中…</div>
  </div>

  <footer>データ: WikiCFP · 毎週自動更新 · <a href="https://github.com/YOUR_USERNAME/conf-tracker" style="color:var(--muted)">GitHub</a></footer>
</div>

<script>
let DATA = [];
let currentFilter = 'all';

function getStatus(deadlineStr) {
  if (!deadlineStr || deadlineStr === 'TBD') return { cls: 'ok', label: '日程未定', days: 9999 };
  const today = new Date();
  today.setHours(0,0,0,0);
  const dl = new Date(deadlineStr);
  const days = Math.ceil((dl - today) / 86400000);
  if (days < 0)  return { cls: 'passed', label: '締切済み', days };
  if (days <= 30) return { cls: 'urgent', label: `${days}日後に締切`, days };
  if (days <= 90) return { cls: 'soon',   label: `${days}日後に締切`, days };
  return { cls: 'ok', label: `${days}日後`, days };
}

function fmt(str) {
  if (!str || str === 'TBD') return 'TBD';
  const d = new Date(str);
  return `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}`;
}

function fmtRange(s, e) {
  if (!s) return 'TBD';
  const sd = new Date(s);
  if (!e) return `${sd.getFullYear()}.${sd.getMonth()+1}.${sd.getDate()}`;
  const ed = new Date(e);
  return `${sd.getFullYear()}.${sd.getMonth()+1}.${sd.getDate()} – ${ed.getMonth()+1}.${ed.getDate()}`;
}

function render() {
  const q = (document.getElementById('search').value || '').toLowerCase();
  const sort = document.getElementById('sort').value;

  let data = DATA.filter(c => {
    const st = getStatus(c.deadline);
    const matchFilter = currentFilter === 'all' || st.cls === currentFilter;
    const matchSearch = !q || c.abbr.toLowerCase().includes(q) || (c.full||'').toLowerCase().includes(q) || (c.area||'').toLowerCase().includes(q);
    return matchFilter && matchSearch;
  });

  data.sort((a, b) => {
    if (sort === 'deadline') return (getStatus(a.deadline).days) - (getStatus(b.deadline).days);
    if (sort === 'conf')     return new Date(a.confDate||'9999') - new Date(b.confDate||'9999');
    if (sort === 'name')     return (a.abbr||'').localeCompare(b.abbr||'');
    return 0;
  });

  const grid = document.getElementById('grid');
  if (!data.length) {
    grid.innerHTML = '<div class="empty">条件に合う会議がありません</div>';
    return;
  }

  grid.innerHTML = data.map(c => {
    const st = getStatus(c.deadline);
    return `
    <div class="card ${st.cls}">
      <div class="card-head">
        <div class="conf-abbr"><a href="${c.url||'#'}" target="_blank" rel="noopener">${c.abbr}</a></div>
        <span class="badge ${st.cls}">${st.label}</span>
      </div>
      <div class="conf-full">${c.full || ''}</div>
      ${c.area ? `<span class="area-tag">${c.area}</span>` : ''}
      <div class="info-grid">
        <div>
          <div class="info-label">開催期間</div>
          <div class="info-value">${fmtRange(c.confDate, c.confDateEnd)}</div>
        </div>
        <div>
          <div class="info-label">開催地</div>
          <div class="info-value">${c.location || 'TBD'}</div>
        </div>
        <div>
          <div class="info-label">投稿締切</div>
          <div class="info-value highlight">${fmt(c.deadline)}</div>
        </div>
        <div>
          <div class="info-label">採否通知</div>
          <div class="info-value">${fmt(c.notification)}</div>
        </div>
      </div>
    </div>`;
  }).join('');
}

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    render();
  });
});

// Load data from conferences.json
fetch('conferences.json')
  .then(r => {
    if (!r.ok) throw new Error('conferences.json の読み込みに失敗しました');
    return r.json();
  })
  .then(json => {
    DATA = json.conferences || json;
    const updatedAt = json.updated_at;
    if (updatedAt) {
      document.getElementById('updated-time').textContent = `最終更新: ${new Date(updatedAt).toLocaleString('ja-JP')}`;
    }
    render();
  })
  .catch(err => {
    document.getElementById('error-area').innerHTML = `<div class="error-box">エラー: ${err.message}</div>`;
    document.getElementById('grid').innerHTML = '';
  });
</script>
</body>
</html>
