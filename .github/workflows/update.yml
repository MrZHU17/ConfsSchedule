name: Update Conference Data

on:
  schedule:
    - cron: '0 0 * * 1'   # 毎週月曜 UTC 00:00（JST 09:00）
  workflow_dispatch:
  push:
    paths:
      - 'scripts/scraper.py'
      - 'conferences.override.json'

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Validate override JSON
        run: |
          python - <<'EOF'
          import json, re, sys
          path = "conferences.override.json"
          text = open(path).read()
          try:
              json.loads(text)
              print("override JSON: OK")
          except json.JSONDecodeError as e:
              # trailing comma の自動修正を試みる
              fixed = re.sub(r",\s*([}\]])", r"\1", text)
              try:
                  json.loads(fixed)
                  print("override JSON: trailing comma を自動修正して OK")
                  open(path, "w").write(fixed)
              except json.JSONDecodeError as e2:
                  print(f"override JSON: 修正不能なエラー: {e2}", file=sys.stderr)
                  sys.exit(1)
          EOF

      - name: Run scraper
        run: python scripts/scraper.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add conferences.json
          git diff --cached --quiet && echo "No changes, skipping." && exit 0

          git commit -m "chore: update conferences.json [$(date -u '+%Y-%m-%d')]"

          git fetch origin master
          if ! git rebase -X ours origin/master; then
            git checkout --ours conferences.json
            git add conferences.json
            GIT_EDITOR=true git rebase --continue
          fi

          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
